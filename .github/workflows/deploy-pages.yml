name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve deployment settings
        shell: bash
        env:
          CONFIGURED_GAME_SERVER_HOST: ${{ vars.GAME_SERVER_HOST }}
          CONFIGURED_SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"

          host="$CONFIGURED_GAME_SERVER_HOST"
          if [[ -z "$host" ]]; then
            echo "Repository variable GAME_SERVER_HOST is required." >&2
            exit 1
          fi

          host="${host#https://}"
          host="${host#http://}"
          host="${host%/}"

          base="$CONFIGURED_SITE_BASE_PATH"
          if [[ -z "$base" ]]; then
            if [[ "${repo,,}" == "${owner}.github.io" ]]; then
              base="/"
            else
              base="/${repo}/"
            fi
          fi

          echo "VITE_GAME_SERVER_HOST=$host" >> "$GITHUB_ENV"
          echo "VITE_BASE_PATH=$base" >> "$GITHUB_ENV"
          echo "Game server host: $host"
          echo "Site base path: $base"

      - name: Test and build
        run: npm run check

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
