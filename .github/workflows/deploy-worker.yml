name: Deploy Cloudflare game server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "src/shared/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.worker.json"
      - ".github/workflows/deploy-worker.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test and type-check
        run: npm run test:run && npm run typecheck

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
